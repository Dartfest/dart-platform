<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Dart Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial, sans-serif; background:#f3f4f6; margin:0; }
    .app { max-width:900px; margin:20px auto; background:#fff; padding:20px; border-radius:8px; }
    h1,h2 { margin-top:0; }
    input, select { padding:8px; margin:5px 0; }
    button { padding:8px 12px; margin:5px 0; cursor:pointer; }
    ul { padding-left:18px; }
    li { background:#eee; margin-top:5px; padding:6px; border-radius:4px; }
    .section { margin-top:25px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  </style>
</head>

<body>
<div class="app">
  <h1>🎯 Dart Platform</h1>

  <div class="grid">
    <!-- Spelers -->
    <div class="section">
      <h2>👤 Spelers</h2>
      <input id="playerInput" placeholder="Spelernaam">
      <button onclick="addPlayer()">Toevoegen</button>
      <ul id="playersList"></ul>
    </div>

    <!-- Ranking -->
    <div class="section">
      <h2>🏆 Ranking</h2>
      <ul id="rankingList"></ul>
    </div>
  </div>

  <!-- Teams -->
  <div class="section">
    <h2>👥 Teams (dubbels)</h2>
    <input id="teamName" placeholder="Teamnaam"><br>
    <select id="teamP1"></select>
    <select id="teamP2"></select>
    <button onclick="addTeam()">Team maken</button>
    <ul id="teamsList"></ul>
  </div>

  <!-- Team match -->
  <div class="section">
    <h2>📝 Dubbels wedstrijd</h2>
    <select id="teamA"></select>
    <select id="teamB"></select>
    <button onclick="teamMatch()">Team A wint</button>
  </div>

  <!-- 501 vs AI -->
  <div class="section">
    <h2>🎯 Single 501 vs AI</h2>
    <select id="singlePlayer"></select>
    <select id="ai">
      <option value="easy">AI Easy</option>
      <option value="normal">AI Normal</option>
      <option value="hard">AI Hard</option>
    </select>
    <button onclick="start501()">Start 501</button>
    <p id="game"></p>
    <button onclick="throw501()">Gooi beurt</button>
  </div>
</div>

<script>
const store = s => JSON.parse(localStorage.getItem(s) || "null");
const save = (k,v) => localStorage.setItem(k, JSON.stringify(v));

let players = store("players") || [];
let stats = store("stats") || {};
let teams = store("teams") || [];
let game = store("game") || null;

function render(){
  playersList.innerHTML="";
  players.forEach(p=>{
    playersList.innerHTML+=`<li>${p}</li>`;
    if(!stats[p]) stats[p]={w:0,l:0};
  });

  rankingList.innerHTML="";
  Object.entries(stats)
    .sort((a,b)=>b[1].w-a[1].w)
    .forEach(([n,s])=>rankingList.innerHTML+=`<li>${n} (W:${s.w} L:${s.l})</li>`);

  [teamP1,teamP2,singlePlayer].forEach(s=>{
    s.innerHTML="<option value=''>Kies speler</option>";
    players.forEach(p=>s.innerHTML+=`<option>${p}</option>`);
  });

  teamsList.innerHTML="";
  teams.forEach((t,i)=>teamsList.innerHTML+=`<li>${t.name} (${t.p.join(" & ")}) W:${t.w}</li>`);

  [teamA,teamB].forEach(s=>{
    s.innerHTML="<option value=''>Kies team</option>";
    teams.forEach((t,i)=>s.innerHTML+=`<option value='${i}'>${t.name}</option>`);
  });

  gameText();
}

function addPlayer(){
  if(!playerInput.value) return;
  players.push(playerInput.value);
  playerInput.value="";
  save("players",players); save("stats",stats);
  render();
}

function addTeam(){
  if(!teamName.value||!teamP1.value||!teamP2.value||teamP1.value===teamP2.value) return;
  teams.push({name:teamName.value,p:[teamP1.value,teamP2.value],w:0});
  teamName.value="";
  save("teams",teams);
  render();
}

function teamMatch(){
  if(teamA.value===""||teamB.value===""||teamA.value===teamB.value) return;
  teams[teamA.value].w++;
  save("teams",teams);
  render();
}

function start501(){
  if(!singlePlayer.value) return;
  game={p:singlePlayer.value, ai:ai.value, pr:501, ar:501};
  save("game",game);
  gameText();
}

function throw501(){
  if(!game) return;
  const aiPower = game.ai==="easy"?30:game.ai==="normal"?50:70;
  game.pr-=Math.floor(Math.random()*60)+1;
  game.ar-=Math.floor(Math.random()*aiPower)+1;

  if(game.pr<=0||game.ar<=0){
    if(game.pr<=0) stats[game.p].w++;
    else stats[game.p].l++;
    game=null;
  }
  save("game",game); save("stats",stats);
  render();
}

function gameText(){
  gameEl=document.getElementById("game");
  gameEl.textContent=game?`${game.p}:${game.pr} | AI:${game.ar}`:"Geen lopende wedstrijd";
}

render();
</script>
</body>
</html>
